<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist 4 Pro - Descargas Oficiales</title>
    
    <!-- Librería de Iconos Corregida -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --wa-color: #25D366;
            --tg-color: #0088cc;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.8);
            text-align: center;
        }

        .app-icon {
            width: 110px; height: 110px; border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px; transition: transform 0.3s ease;
        }
        .app-icon:hover { transform: scale(1.05); }

        h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        .tagline { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px; }

        .hero-img {
            width: 100%; max-width: 480px; border-radius: 16px;
            margin-bottom: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .counter-badge {
            background: #dbeafe; color: var(--primary);
            padding: 8px 18px; border-radius: 50px;
            font-weight: 800; font-size: 0.9rem;
            display: inline-flex; align-items: center; gap: 8px;
            margin-bottom: 25px;
        }

        .button-group {
            display: flex; gap: 15px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 40px;
        }

        .btn {
            padding: 15px 30px; border-radius: 14px;
            font-weight: 700; text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.3s ease; cursor: pointer; border: none;
        }

        .btn-main { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-main:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .btn-secondary { background: #f1f5f9; color: var(--text-main); border: 1px solid #e2e8f0; }
        .btn-secondary:hover { background: #e2e8f0; transform: translateY(-2px); }

        .share-section {
            margin-top: 40px; padding: 25px;
            background: rgba(37, 99, 235, 0.05);
            border-radius: 20px; border: 1px dashed var(--primary);
        }

        .share-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }

        .btn-share {
            padding: 10px 18px; border-radius: 10px; text-decoration: none;
            font-weight: 600; font-size: 0.85rem; color: white;
            display: flex; align-items: center; gap: 8px; transition: 0.3s; border: none; cursor: pointer;
        }

        .wa { background-color: var(--wa-color); }
        .tg { background-color: var(--tg-color); }
        .copy-link { background-color: #64748b; }

        .video-section { border-top: 1px solid #e2e8f0; padding-top: 35px; margin-top: 40px; }
        .video-wrapper { border-radius: 18px; overflow: hidden; background: #000; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        video { display: block; width: 100%; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-4px);}
        }
        .fa-circle-arrow-down { animation: bounce 2s infinite; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://juaco58.github.io/Checklist4Pro/maskable-icon-512x512.png" alt="Icono" class="app-icon">
    <h1>Checklist 4 Pro</h1>
    <p class="tagline">La herramienta definitiva para organizar tus compras con eficiencia.</p>

    <img src="https://juaco58.github.io/Checklist4Pro/Pantalla de Inicio con ALIAS.png" alt="Vista Previa" class="hero-img"><br>

    <div class="counter-badge">
        <i class="fa-solid fa-chart-line"></i> Descargas: <span id="download-count">...</span>
    </div>

    <div class="button-group">
        <!-- El evento onclick llama a la función corregida -->
        <a href="https://juaco58.github.io/Checklist4Pro/index.html" class="btn btn-main" id="download-link" onclick="registrarDescarga()">
            <i class="fa-solid fa-circle-arrow-down"></i> Descargar App
        </a>
        <a href="https://juaco58.github.io/Checklist4Pro/InfoChecklist4Pro.pdf" class="btn btn-secondary" target="_blank">
            <i class="fa-solid fa-file-pdf"></i> Info Técnica (PDF)
        </a>
    </div>

    <div class="video-section">
        <h3><i class="fa-solid fa-play-circle" style="color: #ef4444; margin-right: 8px;"></i>Video Tutorial</h3>
        <div class="video-wrapper">
            <video controls>
                <source src="https://juaco58.github.io/Checklist4Pro/TutorialComprimido.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </div>
    </div>

    <div class="share-section">
        <h4 style="margin: 0; color: var(--primary);">🚀 ¡Ayúdanos a llegar a más personas!</h4>
        <div class="share-buttons">
            <a href="https://wa.me/Te%20recomiendo%20esta%20App%20para%20organizar%20tus%20compras%3A%20https%3A&2F%2Fjuaco58.github.io%2FChecklist4Pro%2FPagDescargaContadorReal.html" target="_blank" class="btn-share wa">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
            <a href="https://t.me/share/url?url=https://juaco58.github.io/Checklist4Pro/PagDescargaContadorReal.html&text=Te%20recomiendo esta App para tus compras" target="_blank" class="btn-share tg">
                <i class="fa-brands fa-telegram"></i> Telegram
            </a>
            <button onclick="copiarEnlace()" class="btn-share copy-link">
                <i class="fa-solid fa-link"></i> <span id="txt-copy">https://juaco58.github.io/Checklist4Pro/PagDescargaContadorReal.html</span>
            </button>
        </div>
    </div>
</div>

<script>
    // Configuración de la API (Nombre único para tu contador)
    const namespace = 'juaco58_checklist4pro';
    const key = 'descargas';

    // Función para obtener el número actual al cargar la página
    async function cargarConteo() {
        const display = document.getElementById('download-count');
        try {
            const res = await fetch(`https://api.countapi.xyz{namespace}/${key}`);
            const data = await res.json();
            display.innerText = data.value || 0;
        } catch (e) {
            // Si falla o no existe, muestra 0
            display.innerText = "0";
        }
    }

    // Función para sumar 1 descarga
    async function registrarDescarga() {
        const display = document.getElementById('download-count');
        try {
            // "hit" suma uno automáticamente en la base de datos
            const res = await fetch(`https://api.countapi.xyz{namespace}/${key}`);
            const data = await res.json();
            display.innerText = data.value;
        } catch (e) {
            console.error("Error al actualizar contador", e);
        }
    }

    function copiarEnlace() {
        const url = window.location.href;
        const txt = document.getElementById('txt-copy');
        navigator.clipboard.writeText(url).then(() => {
            txt.innerText = "¡Copiado!";
            setTimeout(() => { txt.innerText = "Copiar Link"; }, 2000);
        });
    }

    // Iniciar carga del contador
    cargarConteo();
</script>

</body>
</html>
