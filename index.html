<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist 4 Pro 🛒</title>
    <link rel="manifest" href="./manifest.json">
    <!-- También es recomendable agregar esto para el color de la barra en el celu -->
    <meta name="theme-color" content="#3498db">
    
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #2972a3; --success: #117d3e; --danger: #c21c0a; --warning: #915b05; --dark: #20558a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .card { background: white; width: 100%; max-width: 450px; padding: 1.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: var(--dark); margin: 0 0 15px 0; }
        .add-section { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"], input[type="number"] { padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; outline: none; font-size: 1rem; width: 100%; }
        .btn { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
        .btn-add { background: var(--primary); color: white; padding: 0 20px; }
        ul { list-style: none; padding: 0; margin: 20px 0; }
        li { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #f0f0f0; padding: 10px; margin-bottom: 8px; border-radius: 10px; }
        .check-btn { width: 24px; height: 24px; border: 2px solid #cbd5e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        li.checked:not(.has-price) .check-btn { background: var(--success); border-color: var(--success); color: white; }
        li.checked:not(.has-price) .check-btn::after { content: '✓'; font-size: 14px; }
        li.has-price .check-btn { background-color: var(--danger) !important; border-color: var(--danger) !important; color: white; }
        li.has-price .check-btn::after { content: '✕'; font-size: 12px; }
        li.has-price .item-name { text-decoration: line-through; color: #a0aec0; }
        .item-name { 
    flex: 1; 
    font-weight: 500; 
    color: #4a5568; 
    cursor: grab; 
    user-select: none; /* Esto evita que el texto se sombreado azul al arrastrarlo */
}

.item-name:active { 
    cursor: grabbing; /* Muestra la mano cerrada mientras lo mantienes presionado */
}
        .input-price { width: 85px !important; text-align: right; }
        
        /* BOTÓN BORRAR: Gris más oscuro, Bold y Hover Rojo */
        .btn-del { 
            min-width: 32px; 
            background: none !important; 
            color: #7f8c8d !important; /* Gris oscuro para visibilidad */
            border: none !important; 
            font-size: 0.9rem; 
            font-weight: 900 !important; 
            cursor: pointer; 
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 2px 8px;
        }
        .btn-del:hover { 
            color: var(--danger) !important; 
        }

 .total-container { 
    padding: 12px 18px; /* Menos espacio arriba y abajo */
    background: var(--dark); 
    color: white; 
    border-radius: 12px; 
    display: flex; 
    justify-content: space-between; 
    font-size: 1.1rem; /* Tamaño más balanceado para móviles */
    font-weight: bold;
    position: sticky;
    bottom: 125px; 
    z-index: 101;
    box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
}

.actions-grid { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 10px; 
    padding: 10px 0 5px 0;
    margin-top: 0;
    /* LO PEGAMOS AL BORDE FINAL */
    position: sticky;
    bottom: 0;
    background: var(--bg); /* Usamos el color de fondo de la app para que no transparente */
    z-index: 100;
}

.btn-action { 
    padding: 12px; 
    font-size: 0.85rem; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 8px; 
    border-radius: 10px; 
    border: none; 
    cursor: pointer; 
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
    
    .btn-del {
    transition: all 0.2s ease;
    min-width: 30px; /* Evita que la línea se mueva al cambiar el icono */
}
.btn-del.confirm-delete {
    transform: scale(1.3); /* Se agranda un poquito para advertir */
    color: var(--danger) !important;

    background-color: #fef2f2 !important; /* Rojo pastel más intenso y visible */
    border-radius: 6px; /* Bordes redondeados para el fondo */
}

    </style>

   <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <div class="card">
        <h2>Mi Compra 🛒</h2>
        <div class="add-section">
            <input id="new-item" placeholder="Ej: Café, Pan..." type="text">
            <button class="btn btn-add" id="btn-add">Añadir</button>
        </div>
        <ul id="list-container"></ul>
        <div class="total-container">
            <span>TOTAL:</span>
            <span id="grand-total">$0.00</span>
        </div>
        <div class="actions-grid">
            <button class="btn-action" style="background:#edf2f7; color:var(--dark)" id="btn-share">📤 Compartir</button>
            <button class="btn-action" style="background:#fffaf0; color:var(--warning)" id="btn-reset-prices">💰 Limpiar $</button>
            <button class="btn-action" style="background:#e8f5e9; color:var(--success)" id="btn-reset-checks">🔄 Desmarcar</button>
            <button class="btn-action" style="background:#fff5f5; color:var(--danger)" id="btn-clear">🗑️ Vaciar Lista</button>
        </div>
        <footer style="text-align: center; font-size: small; padding-top: 20px; color: #718096;">
            © Joaquín Luis Navarro | Alias: <b>juaco58.arg.mp</b>
        </footer>
    </div>

<script>
    const inputItem = document.getElementById('new-item');
    const btnAdd = document.getElementById('btn-add');
    const listContainer = document.getElementById('list-container');
    const grandTotalDisplay = document.getElementById('grand-total');

    function save() {
        const items = Array.from(document.querySelectorAll('#list-container li')).map(li => ({
            name: li.querySelector('.item-name').textContent,
            price: li.querySelector('.input-price').value,
            checked: li.classList.contains('checked')
        }));
        localStorage.setItem('marketListV3', JSON.stringify(items));
    }

    function calculateTotal() {
        let total = 0;
        document.querySelectorAll('#list-container li').forEach(li => {
            const pInput = li.querySelector('.input-price');
            let val = parseFloat(pInput.value);
            
            // SEGURIDAD: Bloqueo de negativos
            if (val < 0) { val = 0; pInput.value = ""; }

            // Solo tacha y pone rojo si el precio es MAYOR a 0
            if (pInput.value !== "" && !isNaN(val) && val > 0) {
                li.classList.add('has-price');
                total += val;
            } else {
                li.classList.remove('has-price');
            }
        });
        grandTotalDisplay.textContent = `$${total.toFixed(2)}`;
        save();
    }

    function createItem(name, price = "", isChecked = false) {
        if (!name) return;
        const li = document.createElement('li');
        if (isChecked) li.classList.add('checked');
        
        li.innerHTML = `
            <div class="check-btn"></div>
            <span class="item-name">${name}</span>
            <input type="number" class="input-price" placeholder="0.00" step="0.01" value="${price}" inputmode="decimal" min="0">
            <button class="btn-del">✕</button>
        `;

        const pInput = li.querySelector('.input-price');

        // Mientras escribe: valida decimales y negativos
        pInput.addEventListener('input', function() {
            if (this.value < 0) this.value = "";
            let s = this.value;
            if (s.indexOf('.') !== -1) {
                let partes = s.split('.');
                if (partes[1] && partes[1].length > 2) {
                    this.value = parseFloat(s).toFixed(2);
                }
            }
            calculateTotal();
        });

        // Al salir del cuadro (Blur): Formatea a 0.00
        pInput.addEventListener('blur', function() {
            let val = parseFloat(this.value);
            if (!isNaN(val)) {
                this.value = val.toFixed(2);
            }
            calculateTotal();
        });

        const toggle = () => { li.classList.toggle('checked'); calculateTotal(); };
        li.querySelector('.check-btn').onclick = toggle;
        li.querySelector('.item-name').onclick = toggle;

        const btnDel = li.querySelector('.btn-del');
        btnDel.onclick = () => {
            if (!btnDel.classList.contains('confirm-delete')) {
                btnDel.classList.add('confirm-delete');
                btnDel.style.color = "var(--danger)";
                btnDel.textContent = "🗑️";
                setTimeout(() => {
                    btnDel.classList.remove('confirm-delete');
                    btnDel.style.color = "#7f8c8d";
                    btnDel.textContent = "✕";
                }, 2000);
            } else {
                li.style.opacity = "0";
                li.style.transform = "translateX(20px)";
                li.style.transition = "all 0.3s ease";
                setTimeout(() => { li.remove(); calculateTotal(); }, 300);
            }
        };

        listContainer.appendChild(li);
        if (price !== "") calculateTotal();
    }

    btnAdd.onclick = () => {
        const val = inputItem.value.trim();
        if(val) { createItem(val); inputItem.value = ""; inputItem.focus(); calculateTotal(); }
    };

    new Sortable(listContainer, {
        animation: 150,
        handle: '.item-name',
        delay: 150,
        delayOnTouchOnly: true,
        onEnd: () => { calculateTotal(); }
    });

    inputItem.onkeypress = (e) => { if(e.key === 'Enter') btnAdd.click(); };

           // --- NUEVA FUNCIÓN DE COMPARTIR Y BACKUP (MODIFICADA) ---
    document.getElementById('btn-share').onclick = async () => {
        // Mostramos el menú para elegir qué hacer
       const opcion = prompt("Escribí el número de opción elegido y picá [Aceptar]\n\n          ⚠️ (REINTENTAR SI NO RESPONDE) ⚠️\n\n1. Compartir Texto Plano (Ir al menú de Apps)\n2. Guardar archivo de lista (Backup)\n3. Abrir archivo de lista (Restaurar)");


        if (opcion === "1") {
            // Lógica de compartir TEXTO PLANO (Web Share API)
            let text = "🛒 *MI LISTA DE COMPRA*\n\n";
            document.querySelectorAll('#list-container li').forEach(li => {
                const isChecked = li.classList.contains('checked');
                const hasPrice = li.classList.contains('has-price');
                const name = li.querySelector('.item-name').textContent;
                const price = li.querySelector('.input-price').value;
                
                // Formato visual del texto
                let status = hasPrice ? "🔴" : (isChecked ? "✅" : "⬜");
                let nameFmt = hasPrice ? `${name} ($${price})` : name;
                text += `${status} ${nameFmt}\n`;
            });
            text += `\n💰 *TOTAL: ${grandTotalDisplay.textContent}*`;
            
            // Abrir el menú nativo del celular
            if (navigator.share) {
                try { 
                    await navigator.share({ 
                        title: 'Mi Lista de Compra', 
                        text: text 
                    }); 
                } catch(e) {
                    console.log("Compartir cancelado");
                }
            } else {
                // Fallback: Si el navegador no lo soporta, copia al portapapeles
                await navigator.clipboard.writeText(text); 
                alert("✅ ¡Texto copiado al portapapeles!");
            }
        } 
        
        else if (opcion === "2") {
            // EXPORTAR: Crea un archivo .json con los datos actuales
            const data = localStorage.getItem('marketListV3');
            if (!data || data === "[]") return alert("La lista está vacía.");
            
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const fecha = new Date().toISOString().slice(0,10);
            a.href = url;
            a.download = `lista_compra_${fecha}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } 
        
        else if (opcion === "3") {
            // IMPORTAR: Abre el selector de archivos del celu/PC
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = readerEvent => {
                    try {
                        const content = readerEvent.target.result;
                        JSON.parse(content); 
                        localStorage.setItem('marketListV3', content);
                        window.location.reload(); 
                    } catch(err) {
                        alert("❌ Error: El archivo no es válido.");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
    };



    document.getElementById('btn-reset-checks').onclick = () => {
        document.querySelectorAll('#list-container li').forEach(li => li.classList.remove('checked'));
        calculateTotal();
    };

    document.getElementById('btn-reset-prices').onclick = () => {
        if(confirm("¿Borrar todos los precios?")) {
            document.querySelectorAll('.input-price').forEach(i => i.value = "");
            calculateTotal();
        }
    };

    document.getElementById('btn-clear').onclick = () => {
        if(confirm("¿Vaciar lista completa?")) { listContainer.innerHTML = ""; calculateTotal(); }
    };

    window.onload = () => {
        const saved = localStorage.getItem('marketListV3');
        if (saved) {
            JSON.parse(saved).forEach(i => createItem(i.name, i.price, i.checked));
        }
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js').then(reg => {
            reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        if(confirm("¡Nueva versión disponible! ¿Actualizar ahora?")) {
                            window.location.reload();
                        }
                    }
                };
            };
        });
    }
</script>
</body>
</html>
